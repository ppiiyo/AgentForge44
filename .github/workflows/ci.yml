name: KostromAi44 CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run tmate session on failure to debug'
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-analysis:
    name: Lint & Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          timeout-minutes: 5

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci --legacy-peer-deps
        timeout-minutes: 5

      - name: Run TypeScript Linter Check
        run: npm run lint

      - name: Run npm audit security scan
        # Keep audit running but non-blocking on low-level issues
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Setup tmate session for debugging static-analysis on failure
        if: failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled == true
        uses: mxschmitt/action-tmate@v3.18.0

  build-and-test:
    name: Compile & Run Tests
    needs: static-analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          timeout-minutes: 5

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci --legacy-peer-deps
        timeout-minutes: 5

      - name: Build Production Bundles
        run: npm run build

      - name: Run Vitest Unit & Integration Suites
        run: npm run test

      - name: Setup tmate session for debugging build-and-test on failure
        if: failure() && github.event_name == 'workflow_dispatch' && inputs.debug_enabled == true
        uses: mxschmitt/action-tmate@v3.18.0


