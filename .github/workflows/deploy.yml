name: Deploy and Docker Build CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-ci:
    name: Build and Test Dockerized Services
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          timeout-minutes: 5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.3.0
        with:
          timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
        with:
          timeout-minutes: 5

      - name: Verify Docker Compose Configuration
        run: docker compose config

      - name: Build Frontend Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: true
          tags: kostromai44-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: true
          tags: kostromai44-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Executor Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.executor
          push: false
          load: true
          tags: kostromai44-executor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Database and Redis Dependency containers
        run: |
          docker compose up -d kostromai44-db kostromai44-redis
          echo "Waiting for services to initialize..."
          sleep 10
          docker compose ps

      - name: Run Integration Tests inside Compose Environment
        run: |
          # Build and run tests within the backend container connected to database & redis
          docker compose run --rm kostromai44-backend npm run test

      - name: Shutdown Compose Services
        if: always()
        run: docker compose down -v

