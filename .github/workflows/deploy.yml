name: Deploy and Docker Build CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Trigger deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker-ci:
    name: Build and Test Dockerized Services
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Source Code
        # Using commit SHA for security hardening
        uses: actions/checkout@v4
        with:
          timeout-minutes: 5

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.3.0
        with:
          timeout-minutes: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0
        with:
          timeout-minutes: 5

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercased repository name
        run: |
          echo "REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr 'A-Z' 'a-z')" >> ${GITHUB_ENV}
          echo "REF_LOWER=$(echo "${{ replace(github.ref_name, '/', '-') }}" | tr 'A-Z' 'a-z')" >> ${GITHUB_ENV}

      - name: Verify Docker Compose Configuration
        run: docker compose config

      - name: Build and Push Frontend Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          load: ${{ !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/frontend:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ env.REF_LOWER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Backend Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          load: ${{ !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/backend:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ env.REF_LOWER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Executor Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.executor
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          load: ${{ !(github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/executor:latest
            ghcr.io/${{ env.REPO_LOWER }}/executor:sha-${{ github.sha }}
            ghcr.io/${{ env.REPO_LOWER }}/executor:${{ env.REF_LOWER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Database and Redis Dependency containers
        run: |
          docker compose up -d --wait --wait-timeout 60 kostromai44-db kostromai44-redis
          docker compose ps

      - name: Run Integration Tests inside Compose Environment
        run: |
          # Build and run tests within the backend container connected to database & redis
          docker compose run --rm kostromai44-backend npm run test

      - name: Shutdown Compose Services
        if: always()
        run: docker compose down -v

  rollback:
    name: Emergency Deployment Rollback
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Rolling Rollback on EKS Cluster
        run: |
          echo "Simulating EKS rollback..."
          echo "kubectl rollout undo deployment/kostromai4444-api -n production"
          echo "kubectl rollout status deployment/kostromai4444-api -n production"
          echo "Rollback successfully triggered and verified."


