name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 4 * * 1' # Runs every Monday at 04:30 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Scan
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        timeout-minutes: 5

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3.28.10
      with:
        languages: ${{ matrix.language }}
        queries: security-extended,security-and-quality

    # Manual build steps (since typescript compilation helps static graph analyses)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci --legacy-peer-deps --ignore-scripts
      timeout-minutes: 10

    - name: Build Application
      run: npm run build
      timeout-minutes: 10

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3.28.10
      with:
        category: "/language:${{matrix.language}}"
