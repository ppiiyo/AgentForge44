apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentforge44-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentforge44-api
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 4
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: agentforge44-api
  namespace: production
spec:
  hosts:
  - "api.agentforge44.com"
  gateways:
  - agentforge-gateway
  http:
  - route:
    - destination:
        host: agentforge44-api-service
        port:
          number: 3000
      weight: 95
    - destination:
        host: agentforge44-api-canary-service
        port:
          number: 3000
      weight: 5
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: agentforge44-mtls
  namespace: production
spec:
  mtls:
    mode: STRICT
